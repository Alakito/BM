<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BM 运营工具中心</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe3ef;
      --brand: #5b45e8;
      --brand2: #7c3aed;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7ff, #edf7f8);
      color: var(--text);
      font-family: Inter, system-ui, "Microsoft YaHei", Arial, sans-serif;
    }
    .shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px 16px;
      background: rgba(255,255,255,.86);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .brand {
      padding: 8px 8px 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .nav {
      display: grid;
      gap: 10px;
    }
    .nav button {
      width: 100%;
      display: grid;
      gap: 4px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 13px 14px;
      color: var(--text);
      cursor: pointer;
      font-weight: 900;
    }
    .nav button span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .nav button.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 16px 32px rgba(91,69,232,.22);
    }
    .nav button.active span { color: rgba(255,255,255,.78); }
    .tip {
      margin-top: auto;
      padding: 12px;
      border: 1px solid #c7d2fe;
      border-radius: 14px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      line-height: 1.6;
      font-weight: 800;
    }
    main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      background: rgba(255,255,255,.72);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .title b {
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title span {
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .actions a {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 9px 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      aside {
        position: static;
        height: auto;
        padding: 14px;
      }
      .nav { grid-template-columns: 1fr 1fr; }
      .tip { margin-top: 0; }
      main { min-height: 76vh; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <h1>BM 运营工具中心</h1>
        <p>成本测算、商品卡分析统一入口。两个工具使用同一个 BM 账号体系。</p>
      </div>
      <div class="nav">
        <button class="active" data-tool="profit">
          成本利润计算器
          <span>项目成本、ROI、投流空间</span>
        </button>
        <button data-tool="product-card">
          商品卡分析工具
          <span>Traffic/List、PID、诊断归因</span>
        </button>
      </div>
      <div class="tip">同一个浏览器里登录一次后，切换工具会复用 BM 账号会话。若某个工具未立即识别登录状态，刷新右侧页面即可。</div>
    </aside>
    <main>
      <div class="topbar">
        <div class="title">
          <b id="toolTitle">成本利润计算器</b>
          <span id="toolDesc">项目成本、ROI、投流空间测算</span>
        </div>
        <div class="actions">
          <a id="openNew" href="BM-profit-calculator/" target="_blank" rel="noreferrer">新窗口打开</a>
          <a href="BM-product-card-bi/" target="_blank" rel="noreferrer">商品卡直达</a>
        </div>
      </div>
      <iframe id="toolFrame" src="BM-profit-calculator/" title="BM Tool"></iframe>
    </main>
  </div>
  <script>
    const tools = {
      profit: {
        title: "成本利润计算器",
        desc: "项目成本、ROI、投流空间测算",
        url: "BM-profit-calculator/"
      },
      "product-card": {
        title: "商品卡分析工具",
        desc: "Traffic/List、PID、每日诊断和变化归因",
        url: "BM-product-card-bi/"
      }
    };
    const buttons = [...document.querySelectorAll("[data-tool]")];
    const frame = document.getElementById("toolFrame");
    const toolTitle = document.getElementById("toolTitle");
    const toolDesc = document.getElementById("toolDesc");
    const openNew = document.getElementById("openNew");

    function selectTool(key, push = true) {
      const tool = tools[key] || tools.profit;
      buttons.forEach(btn => btn.classList.toggle("active", btn.dataset.tool === key));
      frame.src = tool.url;
      toolTitle.textContent = tool.title;
      toolDesc.textContent = tool.desc;
      openNew.href = tool.url;
      if (push) history.replaceState(null, "", "#" + key);
    }
    buttons.forEach(btn => btn.addEventListener("click", () => selectTool(btn.dataset.tool)));
    selectTool(location.hash.replace("#", "") || "profit", false);
  </script>
</body>
</html>
